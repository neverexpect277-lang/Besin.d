name: Mucit Robot - GitHub Pages

on:
  push:
    branches:
      - claude/turkish-product-ideas-IH3Uh
    paths:
      - 'mucit-robot/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./mucit-robot
      - id: deployment
        uses: actions/deploy-pages@v4
